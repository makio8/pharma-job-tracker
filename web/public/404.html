<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>製薬求人DB</title>
    <script>
      // GitHub Pages SPA ルーティング用 404.html
      // URLをsessionStorageに保存してルートへリダイレクト
      // 参考: https://github.com/rafgraph/spa-github-pages
      var pathSegmentsToKeep = 1; // /pharma-job-tracker/ の分 1 を設定

      var l = window.location;
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?/' +
          l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
      );
    </script>
  </head>
  <body>
    <p>リダイレクト中...</p>
  </body>
</html>
