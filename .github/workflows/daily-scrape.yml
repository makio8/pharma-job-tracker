name: Daily Pharma Job Scrape

on:
  schedule:
    # UTC 23:00 = JST 08:00（毎朝8時に実行）
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  scrape-and-post:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write  # gh-pages ブランチへの push に必要

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Restore DB from previous run
        uses: dawidd6/action-download-artifact@v6
        with:
          name: pharma-jobs-db
          path: data/
          workflow: daily-scrape.yml
          search_artifacts: true
          if_no_artifact_found: warn
        continue-on-error: true

      - name: Initialize DB (if first run)
        run: npx tsx src/db/schema.ts

      - name: Run scraper
        run: npm run scrape
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}

      - name: Post daily summary to X
        continue-on-error: true  # X API 未設定でも後続ステップを続行
        run: npm run post
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}

      - name: Migrate DB (add new columns if needed)
        run: npx tsx scripts/migrate-add-analysis.ts
        continue-on-error: true

      - name: Backfill missing descriptions
        run: npx tsx scripts/backfill-descriptions.ts --limit 30
        continue-on-error: true

      - name: Save DB as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pharma-jobs-db
          path: data/pharma-jobs.db
          retention-days: 90
          overwrite: true

      # --- Web ダッシュボード: JSON エクスポート → ビルド → GitHub Pages デプロイ ---

      - name: Export JSON for web
        run: npm run export

      - name: Build web frontend
        run: |
          cd web
          npm ci
          npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./web/dist
          publish_branch: gh-pages
